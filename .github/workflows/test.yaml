name: 'Test'
on:
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v5
      - name: 'Install Node'
        uses: actions/setup-node@v6
        with:
          node-version: '22.x'
      - name: 'Install Deps'
        run: npm i
      - name: Build
        run: npm run build
      - name: 'Test'
        run: npm test